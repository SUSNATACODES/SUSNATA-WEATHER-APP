services:
  - type: web
    name: susnata-weather-app
    env: node
    plan: free
    region: oregon
    rootDir: WeatherServer
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: API_KEY
        sync: false
      - key: PUBLIC_APP_URL
        value: https://oxygen-weather.blogspot.com
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: CONTACT_EMAIL
        sync: false
      - key: MAIL_CRON_SECRET
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 465
      - key: GOOGLE_CLIENT_ID
        value: 567409969604-qr980ja0p5l2b52huv7kgelgncnndkuf.apps.googleusercontent.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://oxygen-weather.blogspot.com,https://www.oxygen-weather.blogspot.com,http://127.0.0.1:5179
    autoDeploy: true
    domains:
      - susnatacode.com
      - www.susnatacode.blogspot.com
