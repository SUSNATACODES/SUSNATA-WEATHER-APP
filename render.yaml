services:
  - type: web
    name: susnata-weather-app
    env: node
    plan: free
    region: oregon
    rootDir: WeatherServer
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: API_KEY
        sync: false
    autoDeploy: true
    domains:
      - susnatacode.com
      - www.susnatacode.blogspot.com
